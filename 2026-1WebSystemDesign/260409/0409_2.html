<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = 10;
        let b =  10.0;
        let c = "10";
        let d = a==b;
        let e = a==c;
        let f = b==c;
        let g = a===b;
        let h = a===c;
        console.log("a==b: " , d); //true
        console.log("a==c: " , e); //true
        console.log("b==c: " , f); //true
        console.log("a===b: " , g); //true
        console.log("a===c: " , h); //false
    </script>
</body>
</html>
