<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 짝수인 숫자들을 3배
        const  number = [1,2,3,4,5,6];

        const result = number
        .filter(num => num % 2 === 0)
        .map(num => num * 3);

        console.log(result);
    </script>
</body>
</html>
