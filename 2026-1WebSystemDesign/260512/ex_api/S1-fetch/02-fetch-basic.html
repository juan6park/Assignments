<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>S1-02 · fetch 첫 호출</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; line-height: 1.6; }
    button { padding: 8px 16px; font-size: 16px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 6px; overflow: auto; }
    .hint { color: #555; font-size: 14px; }
  </style>
</head>
<body>
  <h1>S1-02 · fetch 첫 호출</h1>
  <p>슬라이드: <b>fetch 첫 호출</b> — Promise 두 번 (fetch + .json())</p>
  <p class="hint">DevTools → Network 탭을 열고 버튼을 눌러 호출을 직접 관찰하세요.</p>

  <button id="run">GET /posts/1 호출</button>
  <pre id="out">버튼을 누르면 결과가 여기 표시됩니다.</pre>

  <script>
    async function getPost() {
      const out = document.getElementById('out');
      out.textContent = '로딩 중...';

      // ① fetch는 Promise 반환 → await 한 번
      const response = await fetch('https://jsonplaceholder.typicode.com/posts/1');
      // ② .json()도 Promise 반환 → await 두 번 ⭐
      const data = await response.json();

      console.log('전체 응답 객체:', response);
      console.log('JSON 데이터:', data);

      out.textContent = JSON.stringify(data, null, 2);
    }

    document.getElementById('run').addEventListener('click', getPost);
  </script>
</body>
</html>
