<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>S2-06 · 내 위치 (geolocation)</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; }
    #map { width: 100%; max-width: 700px; height: 450px; border: 1px solid #ddd; border-radius: 6px; }
    button { padding: 8px 14px; cursor: pointer; font-size: 15px; }
    .err { background: #fee; padding: 8px 12px; border-left: 4px solid #c00; }
    .info { color: #555; font-size: 14px; }
  </style>
</head>
<body>
  <h1>S2-06 · 내 위치 + 카카오 맵 결합</h1>
  <p>슬라이드: <b>navigator.geolocation + 카카오 맵</b> — W9 S2 BOM 복습</p>

  <button id="here">내 위치로 이동</button>
  <p class="info">⚠️ 권한 허용 필요 · 배포 시 HTTPS 필수 (localhost는 OK)</p>
  <div id="map"></div>
  <p id="hint"></p>

  <script src="./config.js" onerror="window._noConfig = true"></script>
  <script>
    let map, here;

    if (window._noConfig || !window.KAKAO_JS_KEY || window.KAKAO_JS_KEY.includes('붙여넣기')) {
      document.getElementById('hint').innerHTML = '<div class="err">⚠️ config.js를 설정하세요.</div>';
    } else {
      const sdk = document.createElement('script');
      sdk.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${window.KAKAO_JS_KEY}&autoload=false`;
      sdk.onload = () => kakao.maps.load(initMap);
      document.head.appendChild(sdk);
    }

    function initMap() {
      map = new kakao.maps.Map(document.getElementById('map'), {
        center: new kakao.maps.LatLng(37.5447, 126.9645),
        level: 4
      });
      document.getElementById('here').addEventListener('click', goHere);
    }

    function goHere() {
      if (!navigator.geolocation) {
        alert('이 브라우저는 위치 정보를 지원하지 않습니다.');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const coords = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
          map.setCenter(coords);
          if (here) here.setMap(null);
          here = new kakao.maps.Marker({ position: coords, map, title: '내 위치' });
          console.log('내 좌표:', pos.coords);
        },
        (err) => alert('위치 정보 실패: ' + err.message)
      );
    }
  </script>
</body>
</html>
