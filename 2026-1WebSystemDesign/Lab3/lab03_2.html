<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실전 반응형 레이아웃 실습</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* 패딩과 테두리를 포함하여 전체 크기 계산 */
        }

        body {
            font-family: 'Pretendard', sans-serif;
            line-height: 1.6;
            background-color: #f4f7f6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            padding: 1rem 5%;
            position: sticky; /* 스크롤 시 tap:0에 붙게 해 화면 상단에 메뉴바 고정 */
            top: 0;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer; /* 커서 모양 변경 */
        }

        .container {
            display: grid; 
            grid-template-columns: 200px 1fr 200px; /* 양옆 사이드바 200px 고정, 중앙 영역(1fr) 유동적 할당 */

            gap: 20px;
            padding: 20px 5%;
            min-height: 80vh; /* vh : viewport height 최소 브라우저 화면의 80%는 유지 */
        }

        aside {
            background: #dfe6e9;
            padding: 20px;
            border-radius: 8px;
        }

        main {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* 카드 너비 최소 250px 유지 및 자동 줄바꿈 배치 */

            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease; /* trasform 속성이 작동할 때 0.3초동안 자연스럽게 움직이도록  */
        }

        .card:hover {
            transform: translateY(-10px); /* 마우스 올렸을 때(:hover) 10픽셀 올림 */
        }

        .card-img {
            width: 100%;
            height: 150px;
            background: #bdc3c7;
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #666;
            display: -webkit-box; 
            -webkit-line-clamp: 2; /* 텍스트 2줄 제한 및 ... 처리 */
            -webkit-box-orient: vertical; /* 상자 안 내용물을 세로방향으로 정렬 */
            overflow: hidden;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 200px 1fr; /* 2단짜리 레이아웃을 1단 세로 정렬로 변경 */
            }

            .right-sidebar {
                grid-column: span 2; /* 2단 레이아웃 시 가로 2칸(전체 너비) 병합 */
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none; /* 가로의 기존 메뉴 숨김 */
            }

            .menu-toggle {
                display: block; /* 세줄 메뉴 아이콘 표시 */
            }

            .container {
                grid-template-columns: 1fr; /* 3단짜리 레이아웃을 1단 세로 정렬로 변경 */
            }

            .left-sidebar,
            .right-sidebar {
                order: 2; /* main 아래에 사이드바 배치 (순서 변경) */
            }

            main {
                order: 1; /* main이 가장 상위 요소가 되도록 */
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo">MyResponsiveWeb</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="menu-toggle">☰</div>
    </nav>

    <div class="container">
        <aside class="left-sidebar">
            <h3>카테고리</h3>
            <ul>
                <li>메뉴 1</li>
                <li>메뉴 2</li>
            </ul>
        </aside>

        <main>
            <h2>최신 포스트</h2>

            <div class="card-grid">
                <article class="card">
                    <div class="card-img"></div>
                    <div class="card-content">
                        <div class="card-title">프로젝트 01</div>
                        <p class="card-desc">이곳은 프로젝트의 상세 설명이 들어가는 부분입니다. 내용이 길어지면 자동으로 말줄임표 처리가 됩니다.</p>
                    </div>
                </article>
                <article class="card">
                    <div class="card-img"></div>
                    <div class="card-content">
                        <div class="card-title">프로젝트 02</div>
                        <p class="card-desc">반응형 웹 디자인의 기초인 Flex와 Grid를 활용하여 멋진 결과물을 만들어 보세요.</p>
                    </div>
                </article>
                <article class="card">
                    <div class="card-img"></div>
                    <div class="card-content">
                        <div class="card-title">프로젝트 03</div>
                        <p class="card-desc">CSS 미디어 쿼리를 사용하면 기기에 최적화된 화면을 제공할 수 있습니다.</p>
                    </div>
                </article>
            </div>
        </main>

        <aside class="right-sidebar">
            <h3>광고/공지</h3>
            <p>오늘의 새로운 소식을 확인하세요!</p>
        </aside>
    </div>

    <script>

    </script>
</body>

</html>
