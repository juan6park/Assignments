<!DOCTYPE html>
<html lang="ko">
<head>
    <title>register</title>
</head>
<body>
    <header>
        <h1>사용자 등록 신청서</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <legend><b>기본 정보 (Essential)</b></legend>
                <label for="id">아이디:</label><br>
                <input type="text" id="id" placeholder="4-12글자 영문/숫자" minlength="4" maxlength="12"><br><br>
                <label for="password">비밀번호:</label><br>
                <input type="password" id="password"><br><br>
                <label for="email">이메일:</label><br>
                <input type="email" id="email"><br><br>
            </fieldset>
            <br>
            <fieldset>
                <legend><b>부가 정보 (Optional)</b></legend>

                <label for="number">연락처:</label><br>
                <input type="text" id="number" placeholder="010-1234-5678" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}"><br><br>
                
                <label>관심 분야:</label><br>
                <input type="checkbox" id="html5" name="interest" value="HTML5">
                <label for="html5">HTML5</label>
                <input type="checkbox" id="css3" name="interest" value="CSS3">
                <label for="css3">CSS3</label>
                <input type="checkbox" id="javascript" name="interest" value="JavaScript">
                <label for="javascript">JavaScript</label><br><br>
                
                <label for="skill">숙련도:</label><br>
                <input type="range" id="skill" name="skill" min="0" max="100" step="10"><br><br>
            </fieldset>
            <br>
            <input type="submit" value="가입 신청">
            <input type="reset" value="초기화"><br><br>
        </form>
    </main>
    <footer>
        <a href="index.html">홈으로</a>
        <p>© 2026 Web Programming Course. All rights reserved.</p>
    </footer>
</body>
</html>
