<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>실습 2-4</title>
    <style>
      .box{
        width:300px;
        height:70px;     
        margin:0 auto;
      }
			#style1 {        
        background-color:#bc8321;          
        color:white;    
        text-shadow: 4px 3px 10px rgb(255, 0, 0);  
      }    
      #style2 {
        background: linear-gradient(to right, rgb(93, 198, 152), rgb(4, 113, 48));
        color: white; 
        text-shadow: 4px 3px 10px rgb(255, 0, 0);
      }    
      #style3 {
        background: radial-gradient(ellipse at center, rgb(218, 255, 54), rgb(86, 69, 237));  
        color: white;
        text-shadow: 4px 3px 10px rgb(255, 0, 0);
      }
      h1 {
        text-align: center;
        line-height: 70px;
      }
    </style>
  </head>
  <body>
    <div class="box" id="style1">
      <h1 id="basic">웹 개발 기초</h1>
    </div>
    <div class="box" id="style2">
      <h1>웹 개발 중급</h1>
    </div>
    <div class="box" id="style3">
      <h1>웹 개발 고급</h1>
    </div>
  </body>
</html>
