<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>글자 수 카운터</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 0.5rem;
            font-size: 1rem;
        }

        .count {
            color: #666;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <h1>나의 메모</h1>
    <textarea id="memoText" placeholder="여기에 글을 쓰세요..."></textarea>
    <button id="clear">지우기</button>
    <div class="count">
        글자: <span id="charCount">0</span> · 단어: <span id="wordCount">0</span>
    </div>
    

    <script>
        const textarea = document.querySelector('#memoText');
        const charEl = document.querySelector('#charCount');
        const wordEl = document.querySelector('#wordCount');

        const saveMemo = localStorage.getItem('memo');

        if (saveMemo) {
            textarea.value = saveMemo;
            updateCounts(saveMemo);
        }

        // AI 참조
        textarea.addEventListener('input', (e) => {
            const text = e.target.value;
            localStorage.setItem('memo', text);
            updateCounts(text);
        });
  
        function updateCounts(text) {
            charEl.textContent = text.length;
            // AI 활용
            const words = text.trim().split(/\s+/).filter(w => w !== '');
            wordEl.textContent = words.length;

            // 직접 작성
            if (text.length >= 200) {
                document.querySelector('.count').style.color = 'red';
            }
            else {
                document.querySelector('.count').style.color = '#666';
            }
        } 

        
        const clear = document.querySelector('#clear');

        // AI 활용
        clear.addEventListener('click', () => {
            textarea.value = '';
            localStorage.removeItem('memo');
            updateCounts('');
        });
    </script>
</body>

</html>
