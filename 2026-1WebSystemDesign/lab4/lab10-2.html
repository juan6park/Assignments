<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>북마크 매니저</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            max-width: 700px;
            margin: 0 auto;
        }

        .form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .form input {
            flex: 1;
            padding: 0.5rem;
        }

        button {
            padding: 0.5rem 1rem;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border-bottom: 1px solid #eee;
        }

        .name {
            flex: 1;
            cursor: pointer;
            color: #0066cc;
        }

        .name:hover {
            text-decoration: underline;
        }

        .star {
            cursor: pointer;
            user-select: none;
            color: #ccc;
            font-size: 1.2rem;
        }

        .star.active {
            color: gold;
        }

        .delete-btn {
            background: #ff5252;
            color: white;
            border: none;
            padding: 0.3rem 0.6rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>나의 북마크</h1>
    <div class="form">
        <input type="text" id="nameInput" placeholder="사이트 이름">
        <input type="url" id="urlInput" placeholder="https://...">
        <button id="addBtn">추가</button>
    </div>
    <ul id="bookmarkList"></ul>

    <script>
        const nameInput = document.querySelector('#nameInput');
        const urlInput = document.querySelector('#urlInput');
        const addBtn = document.querySelector('#addBtn');
        const list = document.querySelector('#bookmarkList');

        let bookmarks = [];
        const saved = localStorage.getItem('bookmarks');

        if (saved) {
            // AI 활용
            bookmarks = JSON.parse(saved);
            render();
        }

        
        function render() {
            // AI 활용
            list.innerHTML = bookmarks.map(b => `
                <li data-id="${b.id}">
                    <span class="star ${b.starred ? 'active' : ''}">★</span>
                    <span class="name">${b.name}</span>
                    <button class="delete-btn">삭제</button>
                </li>
            `).join('');
        }

        addBtn.addEventListener('click', () => {
            const name = nameInput.value.trim();
            const url = urlInput.value.trim();

            if (!name || !url) {
                return;
            }

            const newBookmark = {
                id: Date.now(),
                name: name,
                url: url,
                starred: false
            };

            bookmarks.push(newBookmark);
            save();
            render();

            nameInput.value = '';
            urlInput.value = '';
        });

        function save() {
            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
        }

        list.addEventListener('click', (e) => {
            const li = e.target.closest('li');
            if (!li) return;

            const id = Number(li.dataset.id);

            if (e.target.classList.contains('delete-btn')) {
                bookmarks = bookmarks.filter(b => b.id !== id);
            }
            else if (e.target.classList.contains('star')) {
                const target = bookmarks.find(b => b.id === id);
                target.starred = !target.starred;
            }
            else if (e.target.classList.contains('name')) {
                const target = bookmarks.find(b => b.id === id);
                window.open(target.url, '_blank');
            }

            save();
            render();
        });
    </script>
</body>

</html>
