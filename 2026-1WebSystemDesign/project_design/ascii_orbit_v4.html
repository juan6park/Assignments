
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
#wrap { background: #0a1f10; display: flex; align-items: center; justify-content: center; min-height: 520px; position: relative; }
canvas { display: block; }
#popup {
  position: absolute; display: none;
  background: #071510; border: 1px solid #2d5c38;
  padding: 12px 14px; font-family: monospace; font-size: 11px; color: #9dda6a;
  z-index: 20; min-width: 200px; pointer-events: auto;
}
#popup-title { font-size: 10px; color: #7ec850; margin-bottom: 8px; }
.track { padding: 3px 0; border-bottom: 1px solid #122a18; font-size: 10px; line-height: 1.6; }
.add-btn { background: none; border: 1px solid #2d5c38; color: #7ec850; font-family: monospace; font-size: 10px; cursor: pointer; padding: 4px 0; margin-top: 8px; width: 100%; }
.add-btn:hover { background: #122a18; }
.close-btn { float: right; cursor: pointer; color: #3a6a45; }
#hud { position: absolute; bottom: 10px; left: 14px; font-family: monospace; font-size: 8px; color: #2d5c38; line-height: 1.8; pointer-events: none; }
</style>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="popup">
    <span class="close-btn" onclick="closePopup()">[ X ]</span>
    <div id="popup-title"></div>
    <div id="track-list"></div>
    <button class="add-btn" onclick="addStar()">+ ADD TO PLAYLIST</button>
  </div>
  <div id="hud">
    <div>+--[ TASTE RADAR v0.1 ]--+</div>
    <div id="star-hud">STARS: 0</div>
    <div id="scan-hud">SCANNING... ████░░░░</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 440, H = 440;
canvas.width = W; canvas.height = H;

const FS = 8;
const C_DIM = '#2d5c38';
const C_MID = '#4a8a55';
const C_BRIGHT = '#9dda6a';
const C_HOV = '#c8f080';

const mockTracks = {
  'HIP-HOP × JAZZ': [
    { name: 'N.Y. State of Mind', artist: 'Nas' },
    { name: 'So What', artist: 'Miles Davis' },
    { name: 'DUCKWORTH.', artist: 'Kendrick Lamar' },
  ],
  'HIP-HOP × ELEC': [
    { name: 'Stronger', artist: 'Kanye West' },
    { name: 'HUMBLE.', artist: 'Kendrick Lamar' },
  ],
  'JAZZ × ELEC': [
    { name: 'Midnight City', artist: 'M83' },
    { name: 'Blue in Green', artist: 'Miles Davis' },
  ],
};

function randomSats() {
  const cx = W / 2, cy = H / 2;
  const R = 96;
  const a0 = Math.random() * Math.PI * 2;
  const angles = [a0, a0 + Math.PI * 0.65 + Math.random()*0.3, a0 + Math.PI * 1.3 + Math.random()*0.3];
  const labels = ['HIP-HOP', 'JAZZ', 'ELEC'];
  return angles.map((a, i) => {
    const d = 62 + Math.random() * 18;
    return {
      label: labels[i],
      cx: cx + Math.cos(a) * d,
      cy: cy + Math.sin(a) * d,
      r: R,
      hovering: false,
    };
  });
}

const sats = randomSats();
const stars = [];
let hoveredZone = null;
let starCount = 0;
let currentZone = null;

// 각 궤도 위 문자들 — 위치와 현재 비트값 저장
function buildOrbitChars(sat) {
  const chars = [];
  for (let ring = 0; ring < 2; ring++) {
    const r = ring === 0 ? sat.r : sat.r * 0.7;
    const circ = 2 * Math.PI * r;
    const spacing = FS * 1.35;
    const count = Math.floor(circ / spacing);
    for (let i = 0; i < count; i++) {
      const a = (i / count) * Math.PI * 2;
      chars.push({
        x: sat.cx + Math.cos(a) * r,
        y: sat.cy + Math.sin(a) * r,
        a,
        bit: Math.random() > 0.5 ? '1' : '0',
        nextFlip: Math.random() * 3000 + 500,
        lastFlip: performance.now() + Math.random() * 2000,
        ring,
      });
    }
  }
  sat.chars = chars;
}
sats.forEach(buildOrbitChars);

// 겹치는 원 개수 맵 (픽셀 단위 대신 점 기반으로 교차 수 계산)
function overlapCount(px, py) {
  return sats.filter(s => Math.hypot(px - s.cx, py - s.cy) < s.r).length;
}

function getIntersections() {
  const zones = [];
  for (let i = 0; i < sats.length; i++) {
    for (let j = i + 1; j < sats.length; j++) {
      const a = sats[i], b = sats[j];
      const d = Math.hypot(a.cx - b.cx, a.cy - b.cy);
      if (d < a.r + b.r) {
        zones.push({
          label: `${a.label} × ${b.label}`,
          ax: a.cx, ay: a.cy, ar: a.r,
          bx: b.cx, by: b.cy, br: b.r,
        });
      }
    }
  }
  return zones;
}

function inZone(px, py, z) {
  return Math.hypot(px - z.ax, py - z.ay) < z.ar &&
         Math.hypot(px - z.bx, py - z.by) < z.br;
}

// 3개 원 모두 겹치는지
function inTriple(px, py) {
  return sats.every(s => Math.hypot(px - s.cx, py - s.cy) < s.r);
}

function drawGrid() {
  ctx.save();
  ctx.strokeStyle = '#2d5c38';
  ctx.lineWidth = 0.5;
  ctx.globalAlpha = 0.1;
  [55, 110, 165, 210].forEach(r => {
    ctx.beginPath(); ctx.arc(W/2, H/2, r, 0, Math.PI*2); ctx.stroke();
  });
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.restore();
}

function drawZoneHighlights(zones, mx, my) {
  zones.forEach(z => {
    const hov = z.label === hoveredZone;
    if (!hov) return;

    // 겹치는 원 수에 따라 밝기 결정
    const cx = (z.ax + z.bx) / 2;
    const cy = (z.ay + z.by) / 2;
    const triple = inTriple(cx, cy);
    const alpha = triple ? 0.35 : 0.18;

    ctx.save();
    ctx.beginPath();
    ctx.arc(z.ax, z.ay, z.ar, 0, Math.PI*2);
    ctx.clip();
    ctx.beginPath();
    ctx.arc(z.bx, z.by, z.br, 0, Math.PI*2);
    ctx.fillStyle = `rgba(126,200,80,${alpha})`;
    ctx.fill();
    ctx.restore();
  });

  // 세 원 모두 겹치는 영역 — 더 밝게
  const tripleHov = hoveredZone === '__triple__';
  if (tripleHov) {
    ctx.save();
    ctx.beginPath(); ctx.arc(sats[0].cx, sats[0].cy, sats[0].r, 0, Math.PI*2); ctx.clip();
    ctx.beginPath(); ctx.arc(sats[1].cx, sats[1].cy, sats[1].r, 0, Math.PI*2); ctx.clip();
    ctx.beginPath(); ctx.arc(sats[2].cx, sats[2].cy, sats[2].r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(126,200,80,0.45)';
    ctx.fill();
    ctx.restore();
  }
}

function drawChars(now) {
  ctx.font = `${FS}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  sats.forEach(s => {
    s.chars.forEach(ch => {
      // 호버 시 비트 플리핑
      if (s.hovering && now - ch.lastFlip > ch.nextFlip) {
        ch.bit = ch.bit === '0' ? '1' : '0';
        ch.lastFlip = now;
        ch.nextFlip = Math.random() * 1800 + 400;
      }

      const hov = s.hovering;
      const dim = ch.ring === 1;
      ctx.globalAlpha = hov ? (dim ? 0.6 : 0.9) : (dim ? 0.2 : 0.35);
      ctx.fillStyle = hov ? (ch.bit === '1' ? C_BRIGHT : C_MID) : C_DIM;
      ctx.save();
      ctx.translate(ch.x, ch.y);
      ctx.rotate(ch.a + Math.PI / 2);
      ctx.fillText(ch.bit, 0, 0);
      ctx.restore();
    });
  });
  ctx.globalAlpha = 1;
}

function drawSatCenters() {
  ctx.font = `${FS}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  sats.forEach(s => {
    ctx.fillStyle = s.hovering ? C_HOV : C_BRIGHT;
    ctx.globalAlpha = 1;
    ctx.fillText('(◉)', s.cx, s.cy);
    ctx.font = `${FS - 1}px monospace`;
    ctx.fillStyle = s.hovering ? C_BRIGHT : C_MID;
    ctx.globalAlpha = 0.85;
    ctx.fillText(`[${s.label}]`, s.cx, s.cy + 13);
    ctx.font = `${FS}px monospace`;
  });
  ctx.globalAlpha = 1;
}

function drawStars() {
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  stars.forEach(s => {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = C_BRIGHT;
    ctx.fillText('★', s.x, s.y);
  });
  ctx.globalAlpha = 1;
}

function drawHUDtop() {
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#2d5c38';
  ctx.globalAlpha = 0.7;
  ctx.fillText('+--[ TASTE RADAR v0.1 ]--+', 8, 16);
  ctx.globalAlpha = 1;
}

let lastFrame = 0;
function render(now) {
  ctx.clearRect(0, 0, W, H);
  drawGrid();
  const zones = getIntersections();
  drawZoneHighlights(zones);
  drawChars(now);
  drawSatCenters();
  drawStars();
  drawHUDtop();
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// 마우스 이벤트
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);

  sats.forEach(s => {
    s.hovering = Math.hypot(mx - s.cx, my - s.cy) < s.r + 8;
  });

  const zones = getIntersections();
  let found = null;

  if (inTriple(mx, my)) {
    found = '__triple__';
  } else {
    zones.forEach(z => { if (inZone(mx, my, z)) found = z.label; });
  }
  hoveredZone = found;
  canvas.style.cursor = found ? 'pointer' : 'default';
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  const zones = getIntersections();
  if (inTriple(mx, my)) {
    openPopup('HIP-HOP × JAZZ × ELEC', e);
    return;
  }
  zones.forEach(z => { if (inZone(mx, my, z)) openPopup(z.label, e); });
});

canvas.addEventListener('mouseleave', () => {
  sats.forEach(s => s.hovering = false);
  hoveredZone = null;
});

function openPopup(label, e) {
  currentZone = label;
  const wrap = document.getElementById('wrap');
  const popup = document.getElementById('popup');
  const wr = wrap.getBoundingClientRect();
  popup.style.left = Math.min(e.clientX - wr.left + 10, wr.width - 225) + 'px';
  popup.style.top = Math.max(e.clientY - wr.top - 40, 8) + 'px';
  popup.style.display = 'block';
  document.getElementById('popup-title').textContent = '// ' + label;
  const list = document.getElementById('track-list');
  list.innerHTML = '';
  const tracks = mockTracks[label] || [{ name: '(교집합 탐색 중...)', artist: '' }];
  tracks.forEach((t, i) => {
    const d = document.createElement('div');
    d.className = 'track';
    d.innerHTML = `<span style="color:#4a8a55">${String(i+1).padStart(2,'0')}.</span> ${t.name}${t.artist ? `<br><span style="color:#4a8a55;padding-left:14px">↳ ${t.artist}</span>` : ''}`;
    list.appendChild(d);
  });
}
function closePopup() { document.getElementById('popup').style.display = 'none'; }

function addStar() {
  if (!currentZone) return;
  const parts = currentZone.split(' × ');
  const sat = sats.find(s => s.label === parts[Math.floor(Math.random() * parts.length)]);
  if (!sat) return;
  const angle = Math.random() * Math.PI * 2;
  const r = sat.r * (0.65 + Math.random() * 0.42);
  const star = { x: sat.cx + Math.cos(angle) * r, y: sat.cy + Math.sin(angle) * r, alpha: 0 };
  stars.push(star);
  let a = 0;
  function fi() { a += 0.04; star.alpha = Math.min(a, 0.9); if (a < 0.9) requestAnimationFrame(fi); }
  requestAnimationFrame(fi);
  starCount++;
  document.getElementById('star-hud').textContent = `STARS: ${starCount}`;
  closePopup();
}

const bars = ['████░░░░','█████░░░','██████░░','███████░','████████','░███████','░░██████','░░░█████'];
let bi = 0;
setInterval(() => {
  bi = (bi + 1) % bars.length;
  document.getElementById('scan-hud').textContent = 'SCANNING... ' + bars[bi];
}, 350);
</script>
